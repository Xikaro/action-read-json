name: "Action Json Read"
description: "GitHub Action to load properties from a JSON file."
author: "Xikaro forked from ActionsTools"
inputs:
  file_path:
    required: true
    description: "path to file"
  prop_path:
    required: false
    description: "e.g.: key1.key2"
  flat_arrays:
    required: false
    description: "if true, arrays are output as space-separated strings instead of JSON"
    default: "false"
  yaml_arrays:
    required: false
    description: "if true, arrays are output as YAML-style strings (e.g. \"a\", \"b\")"
    default: "false"
runs:
  using: "node20"
  main: "dist/index.js"
branding:
  color: "yellow"
  icon: "fast-forward"
